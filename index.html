<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Ark Parti Takipçisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap');

        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141418;
            --card-border: #2a2a35;
            --text-main: #e2e8f0;
            --text-muted: #838392;
            --accent-gold: #d4af37;
            --accent-red: #e11d48;
            --success-green: #10b981;
            --modal-bg: rgba(10, 10, 12, 0.90);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(225, 29, 72, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        h1 span { color: var(--accent-gold); }

        .dashboard-controls {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 650px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
            flex-wrap: wrap;
            justify-content: center;
        }

        .sync-btn, .cloud-btn, .admin-btn {
            color: white;
            border: none;
            padding: 12px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .sync-btn { background: linear-gradient(135deg, var(--accent-red), #9f1239); flex: 1; min-width: 200px;}
        .sync-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(225, 29, 72, 0.4); }

        .cloud-btn { background: linear-gradient(135deg, #3b82f6, #1d4ed8); flex: 1; min-width: 150px;}
        .cloud-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4); }

        .admin-btn { background: linear-gradient(135deg, #64748b, #334155); flex: 0.5; min-width: 150px;}
        .admin-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(100, 116, 139, 0.4); }

        #sync-status { font-size: 14px; color: var(--accent-gold); font-weight: 600; min-height: 20px; text-align: center; }

        .raid-container { width: 100%; max-width: 1200px; display: flex; flex-direction: column; gap: 50px; }

        .raid-section {
            background: rgba(20, 20, 24, 0.6); border-top: 3px solid var(--card-border);
            border-radius: 12px; padding: 25px; position: relative; display: flex; flex-direction: column;
        }
        .raid-section[data-raid="armoche"] { border-top-color: #3b82f6; }
        .raid-section[data-raid="kazeros"] { border-top-color: #ef4444; }
        .raid-section[data-raid="serca"] { border-top-color: #a855f7; }
        .raid-section[data-raid="cathedral"] { border-top-color: #eab308; }

        .raid-title { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; margin: 0 0 25px 0; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 15px; }
        .parties-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 20px; margin-bottom: 20px; }

        .party-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: all 0.3s; display: flex; flex-direction: column; }
        .party-card.completed { border-color: rgba(16, 185, 129, 0.5); background: rgba(16, 185, 129, 0.05); box-shadow: 0 0 20px rgba(16, 185, 129, 0.1); }

        .party-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px dashed var(--card-border); padding-bottom: 10px; margin-bottom: 15px; }
        .party-header-left { display: flex; align-items: center; gap: 10px; }
        .party-title { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; color: var(--accent-gold); }

        .delete-party-btn { background: transparent; color: var(--text-muted); border: none; font-size: 16px; cursor: pointer; transition: color 0.2s; padding: 0; }
        .delete-party-btn:hover { color: var(--accent-red); text-shadow: 0 0 5px rgba(225, 29, 72, 0.5); }

        .member-list { list-style: none; padding: 0; margin: 0 0 10px 0; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .member-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 8px 12px; border-radius: 6px; font-size: 14px; cursor: grab; user-select: none; transition: all 0.2s; border: 1px solid transparent; }
        .member-item:active { cursor: grabbing; }
        .member-item.drag-over { border: 1px dashed var(--accent-gold); background: rgba(212, 175, 55, 0.1); transform: scale(1.02); }
        .member-item.tracker { border-left: 2px solid var(--accent-gold); }
        .member-item:hover .delete-btn { opacity: 1; pointer-events: auto; }

        .member-info { display: flex; align-items: center; gap: 8px; }
        .member-name { font-weight: 600; color: #cbd5e1; }
        .member-gs { font-size: 11px; color: var(--accent-gold); font-weight: 600; margin-left: 5px; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: all 0.2s; }
        .member-gs:hover { background: rgba(212, 175, 55, 0.2); color: #fff; }
        .member-region { font-size: 10px; color: var(--text-muted); background: #1e1e24; padding: 2px 4px; border-radius: 4px; }

        .delete-btn { background: transparent; color: var(--accent-red); border: none; font-size: 14px; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.2s; padding: 0 5px; }
        .delete-btn:hover { color: #fff; text-shadow: 0 0 5px var(--accent-red); }

        .add-member-btn { background: transparent; border: 1px dashed var(--card-border); color: var(--text-muted); width: 100%; padding: 8px; border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.2s; margin-top: auto; }
        .add-member-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(212, 175, 55, 0.05); }

        .add-party-btn { background: rgba(255, 255, 255, 0.02); border: 2px dashed var(--card-border); color: var(--text-muted); width: 100%; padding: 15px; border-radius: 8px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; font-weight: 700; text-transform: uppercase; transition: all 0.2s; letter-spacing: 1px; }
        .add-party-btn:hover { border-color: var(--success-green); color: var(--success-green); background: rgba(16, 185, 129, 0.05); }

        .status-checkbox { appearance: none; -webkit-appearance: none; width: 26px; height: 26px; background-color: transparent; border: 2px solid var(--text-muted); border-radius: 6px; cursor: pointer; position: relative; transition: all 0.2s; }
        .status-checkbox:checked { background-color: var(--success-green); border-color: var(--success-green); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }
        .status-checkbox:checked::after { content: '✔'; position: absolute; color: white; font-size: 16px; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }

        .loading-text { text-align: center; color: var(--accent-gold); font-family: 'Rajdhani', sans-serif; font-size: 1.5rem; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- MODAL (POP-UP) GENEL TASARIM --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); backdrop-filter: blur(5px); z-index: 1000; justify-content: center; align-items: center; }
        .modal-box { background: var(--card-bg); border: 1px solid var(--accent-gold); border-radius: 12px; padding: 30px; width: 90%; box-shadow: 0 15px 40px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 20px; animation: slideIn 0.3s ease-out; }
        .modal-box-small { max-width: 400px; }
        .modal-box-large { max-width: 1400px; height: 90vh; }
        .modal-box-medium { max-width: 800px; height: 80vh; } 
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 1.8rem; color: var(--accent-gold); margin: 0; text-align: center; text-transform: uppercase; }
        .modal-select { width: 100%; padding: 12px; background: #1e1e24; border: 1px solid var(--card-border); color: var(--text-main); border-radius: 6px; font-size: 1rem; font-family: 'Inter', sans-serif; cursor: pointer; outline: none; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 10px; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; text-transform: uppercase; transition: all 0.2s; }
        .modal-btn-cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); }
        .modal-btn-cancel:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .modal-btn-confirm { background: var(--accent-gold); color: #000; }
        .modal-btn-confirm:hover { background: #eab308; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); }
        .btn-raw { background: #3b82f6; color: white; font-size: 0.9rem; padding: 8px 15px; border-radius: 6px; cursor: pointer; border: none; font-family: 'Rajdhani', sans-serif; font-weight: bold; transition: all 0.2s; }
        .btn-raw:hover { background: #2563eb; box-shadow: 0 0 10px rgba(59, 130, 246, 0.5); }

        /* --- ADMIN PANEL İÇERİK TASARIMI --- */
        .admin-content { display: flex; gap: 20px; height: calc(100% - 100px); overflow: hidden; }
        .admin-panel-col { flex: 1; display: flex; flex-direction: column; gap: 10px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px solid var(--card-border); overflow-y: auto;}
        
        .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .admin-table th, .admin-table td { padding: 8px; text-align: left; border-bottom: 1px solid var(--card-border); }
        .admin-table th { color: var(--accent-gold); position: sticky; top: 0; background: var(--card-bg); z-index: 1;}
        .admin-table tr:hover { background: rgba(255,255,255,0.05); }
        .status-done { color: var(--success-green); font-weight: bold; }
        .status-wait { color: var(--accent-red); font-weight: bold; }

        /* Roster Grid Tasarımı */
        .roster-section { display: flex; flex-direction: column; gap: 15px; }
        .roster-group { background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); border-radius: 8px; padding: 15px; }
        .roster-group h4 { color: var(--accent-gold); margin: 0 0 10px 0; font-family: 'Rajdhani', sans-serif; font-size: 1.2rem; text-transform: uppercase; border-bottom: 1px dashed var(--card-border); padding-bottom: 5px; }
        .roster-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .roster-member { display: flex; justify-content: space-between; align-items: center; background: var(--bg-color); padding: 8px 10px; border-radius: 6px; font-size: 13px; border: 1px solid var(--card-border); }
        
        /* Roster Butonları */
        .add-roster-char-btn { width: 100%; margin-top: 10px; background: transparent; border: 1px dashed var(--card-border); color: var(--text-muted); padding: 8px; border-radius: 6px; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .add-roster-char-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); background: rgba(212, 175, 55, 0.05); }
        .roster-del-btn { background: transparent; color: var(--accent-red); border: none; cursor: pointer; margin-left: 5px; opacity: 0.3; transition: all 0.2s; font-size: 12px; }
        .roster-del-btn:hover { opacity: 1; text-shadow: 0 0 5px var(--accent-red); }

        #admin-json-editor { width: 100%; flex-grow: 1; background: #0a0a0c; color: #10b981; border: 1px solid var(--card-border); padding: 15px; font-family: monospace; font-size: 13px; border-radius: 6px; resize: none; }
    </style>
</head>
<body>

    <h1>Lost Ark <span>Static</span> Takipçisi</h1>

    <div class="dashboard-controls">
        <div class="btn-group">
            <button class="sync-btn" onclick="syncAllParties()">🔄 API Log Taramasını Başlat</button>
            <button class="cloud-btn" onclick="loadDataFromCloud()">☁️ Buluttan Yenile</button>
            <button class="admin-btn" onclick="openAdminModal()">⚙️ Admin</button>
        </div>
        <div id="sync-status">Sistem Hazır. Tüm partiler için tarama başlatabilirsiniz.</div>
    </div>

    <div class="raid-container" id="raid-container">
        </div>

    <div class="modal-overlay" id="partyModal">
        <div class="modal-box modal-box-small">
            <h3 class="modal-title" id="modalRaidName">Raid Adı</h3>
            <p style="margin:0; font-size: 14px; color: var(--text-muted); text-align: center;">Ekleyeceğiniz yeni parti için zorluk seviyesini seçin.</p>
            <select class="modal-select" id="difficultySelect"></select>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-cancel" onclick="closePartyModal()">İptal</button>
                <button class="modal-btn modal-btn-confirm" onclick="confirmAddParty()">Oluştur</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="rawJsonModal" style="z-index: 1001;">
        <div class="modal-box modal-box-medium">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 class="modal-title">🛠️ Raw JSON Düzenleyici</h3>
                <button class="modal-btn modal-btn-cancel" onclick="closeRawJsonModal()">Kapat</button>
            </div>
            <textarea id="admin-json-editor"></textarea>
            <button class="modal-btn modal-btn-confirm" style="width: 100%;" onclick="saveRawJsonData()">💾 Değişiklikleri Buluta Kaydet</button>
        </div>
    </div>

    <div class="modal-overlay" id="adminModal">
        <div class="modal-box modal-box-large">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 class="modal-title">⚙️ Gelişmiş Admin Paneli</h3>
                <button class="modal-btn modal-btn-cancel" onclick="closeAdminModal()">Kapat</button>
            </div>
            
            <div class="admin-content">
                <div class="admin-panel-col" style="flex: 1.2;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <h4 style="margin:0; color:var(--accent-gold);">📊 Veritabanı Tablosu</h4>
                        <button class="btn-raw" onclick="openRawJsonModal()">🛠️ Raw JSON Aç</button>
                    </div>
                    <div id="admin-table-container">Tablo Yükleniyor...</div>
                </div>

                <div class="admin-panel-col" style="flex: 1;">
                    <h4 style="margin:0; margin-bottom: 10px; color:var(--accent-gold);">👥 Roster Yönetimi (Kadrolar)</h4>
                    <div id="admin-rosters-container" class="roster-section">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WORKER_URL = "https://lostarkproxy.bilgehangulseven.workers.dev";
        const raidList = ["armoche", "kazeros", "serca", "cathedral"];
        
        const RAID_DIFFICULTIES = {
            "armoche": { "NM": 1700, "HM": 1720 },
            "kazeros": { "NM": 1710, "HM": 1730 },
            "serca": { "NM": 1710, "HM": 1730, "NMR": 1740 },
            "cathedral": { "NM": 1700, "HM": 1720, "NMR": 1750 }
        };
        const MIN_GS = { "armoche": 1700, "kazeros": 1710, "serca": 1710, "cathedral": 1700 };
        
        const KNOWN_GS = {
            "jihyogehan": 1723, "boksorgehan": 1715, "dancergehan": 1716, "ayibogangehan": 1715, "orakgehan": 1715, "wintergehan": 1710,
            "aelathea": 1737.5, "anilessa": 1724, "laithwen": 1717.5, "zeradorpala": 1710,
            "holysissy": 1724, "artissy": 1720, "boisy": 1715, "buckysy": 1704
        };

        function createMember(name) { return { name: name, region: "CE", gs: KNOWN_GS[name.toLowerCase()] || 0 }; }

        function initDefaultData() {
            let defaultData = {};
            defaultData["armoche"] = [
                { id: `armoche_p1`, name: "1. Parti (HM)", reqGS: 1720, done: false, members: [createMember("Aelathea"), createMember("Holysissy"), createMember("Dancergehan")] },
                { id: `armoche_p2`, name: "2. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Anilessa"), createMember("Artissy"), createMember("Boksorgehan")] },
                { id: `armoche_p3`, name: "3. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Laithwen"), createMember("Boisy"), createMember("Ayibogangehan")] },
                { id: `armoche_p4`, name: "4. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Zeradorpala"), createMember("Buckysy"), createMember("Orakgehan")] }
            ];
            defaultData["kazeros"] = [
                { id: `kazeros_p1`, name: "1. Parti (HM)", reqGS: 1730, done: false, members: [createMember("Aelathea"), createMember("Holysissy"), createMember("Dancergehan")] },
                { id: `kazeros_p2`, name: "2. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Anilessa"), createMember("Artissy"), createMember("Boksorgehan")] },
                { id: `kazeros_p3`, name: "3. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Laithwen"), createMember("Boisy"), createMember("Ayibogangehan")] },
                { id: `kazeros_p4`, name: "4. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Zeradorpala"), createMember("Buckysy"), createMember("Orakgehan")] }
            ];
            defaultData["serca"] = [
                { id: `serca_p1`, name: "1. Parti (HM)", reqGS: 1730, done: false, members: [createMember("Aelathea"), createMember("Dancergehan")] },
                { id: `serca_p2`, name: "2. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Anilessa"), createMember("Boksorgehan")] },
                { id: `serca_p3`, name: "3. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Holysissy"), createMember("Ayibogangehan")] },
                { id: `serca_p4`, name: "4. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Artissy"), createMember("Orakgehan")] },
                { id: `serca_p5`, name: "5. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Boisy"), createMember("Jihyogehan")] },
                { id: `serca_p6`, name: "6. Parti (NM)", reqGS: 1710, done: false, members: [createMember("Buckysy"), createMember("Wintergehan")] }
            ];
            defaultData["cathedral"] = [
                { id: `cathedral_p1`, name: "1. Parti (HM)", reqGS: 1720, done: false, members: [createMember("Aelathea"), createMember("Jihyogehan")] },
                { id: `cathedral_p2`, name: "2. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Anilessa"), createMember("Dancergehan")] },
                { id: `cathedral_p3`, name: "3. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Holysissy"), createMember("Boksorgehan")] },
                { id: `cathedral_p4`, name: "4. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Artissy"), createMember("Ayibogangehan")] },
                { id: `cathedral_p5`, name: "5. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Boisy"), createMember("Orakgehan")] },
                { id: `cathedral_p6`, name: "6. Parti (NM)", reqGS: 1700, done: false, members: [createMember("Buckysy"), createMember("Wintergehan")] }
            ];
            
            defaultData.customRosters = {
                "Bilge Roster": ["jihyogehan", "boksorgehan", "dancergehan", "ayibogangehan", "orakgehan", "wintergehan"],
                "Zerador Roster": ["aelathea", "anilessa", "laithwen", "zeradorpala"],
                "Esin Roster": ["holysissy", "artissy", "boisy", "buckysy"]
            };
            
            defaultData.customGS = {};
            defaultData._lastReset = new Date().getTime();
            return defaultData;
        }

        let rosterData = {};
        let activeModalRaid = ""; 

        // ---------------------------------------------------
        // BULUT VERİTABANI İŞLEMLERİ (CACHE DÜZELTMELİ)
        // ---------------------------------------------------
        async function loadDataFromCloud() {
            const container = document.getElementById('raid-container');
            container.innerHTML = '<div class="loading-text">☁️ Buluttan veriler çekiliyor... Lütfen bekleyin.</div>';
            try {
                // Tarayıcının eski veriyi dayatmasını engellemek için nocache parametresi ve no-store eklendi
                let response = await fetch(WORKER_URL + "/?action=load&nocache=" + new Date().getTime(), {
                    cache: 'no-store'
                });
                let saved = await response.text();
                if (saved && saved !== "null" && saved.trim() !== "") { 
                    rosterData = JSON.parse(saved); 
                    if(!rosterData.customRosters) {
                        rosterData.customRosters = initDefaultData().customRosters;
                        saveDataToCloud();
                    }
                } 
                else { rosterData = initDefaultData(); await saveDataToCloud(); }
            } catch (error) {
                console.error("Buluttan veri çekilemedi:", error);
                document.getElementById('sync-status').innerText = "⚠️ Buluta bağlanılamadı. Sayfayı yenileyin."; return;
            }
            await checkWeeklyReset(); renderUI();
            document.getElementById('sync-status').innerText = "✅ Veriler buluttan başarıyla yüklendi.";
            setTimeout(() => { document.getElementById('sync-status').innerText = 'Sistem Hazır. Tüm partiler için tarama başlatabilirsiniz.'; }, 3000);
        }

        async function saveDataToCloud() {
            try {
                if (!rosterData._lastReset) rosterData._lastReset = new Date().getTime();
                if (!rosterData.customGS) rosterData.customGS = {};
                if (!rosterData.customRosters) rosterData.customRosters = initDefaultData().customRosters;
                await fetch(WORKER_URL + "/?action=save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(rosterData) });
            } catch (error) {
                document.getElementById('sync-status').innerText = "⚠️ Değişiklikler buluta kaydedilemedi!";
            }
        }

        function getLastResetTimestamp() {
            let now = new Date(); resetDate = new Date(now); resetDate.setHours(13, 0, 0, 0);
            let day = now.getDay(); let daysToSubtract = (day >= 3) ? (day - 3) : (day + 4);
            if (day === 3 && now.getHours() < 13) { daysToSubtract = 7; }
            resetDate.setDate(now.getDate() - daysToSubtract);
            return resetDate.getTime();
        }

        async function checkWeeklyReset() {
            const recentWedTime = getLastResetTimestamp();
            if (!rosterData._lastReset || rosterData._lastReset < recentWedTime) {
                let savedCustomGS = rosterData.customGS || {}; 
                let savedRosters = rosterData.customRosters || initDefaultData().customRosters; 
                rosterData = initDefaultData(); 
                rosterData.customGS = savedCustomGS; 
                rosterData.customRosters = savedRosters;
                await saveDataToCloud();
            }
        }

        async function editCharacterGS(charName, currentGS) {
            const newGSStr = prompt(`"${charName}" karakterinin güncel Gearscore'unu girin:`, currentGS || "");
            if (!newGSStr) return;
            const newGS = parseFloat(newGSStr);
            if (isNaN(newGS)) { alert("⚠️ Lütfen geçerli bir sayı girin!"); return; }

            if (!rosterData.customGS) rosterData.customGS = {};
            rosterData.customGS[charName.toLowerCase()] = newGS;

            renderUI(); 
            if (document.getElementById('adminModal').style.display === 'flex') {
                renderAdminTable(); renderAdminRosters();
            }
            document.getElementById('sync-status').innerText = "☁️ Yeni Gearscore buluta kaydediliyor...";
            await saveDataToCloud();
            document.getElementById('sync-status').innerText = "✅ Gearscore güncellendi!";
            setTimeout(() => { document.getElementById('sync-status').innerText = 'Sistem Hazır.'; }, 2000);
        }

        function getActualGS(charName, defaultGS) {
            if (!charName) return 0;
            const nameLower = charName.toLowerCase();
            return (rosterData.customGS && rosterData.customGS[nameLower]) || defaultGS || KNOWN_GS[nameLower] || 0;
        }

        // ---------------------------------------------------
        // SÜRÜKLE & BIRAK (DRAG & DROP)
        // ---------------------------------------------------
        function dragStart(ev, raid, pIndex, mIndex) {
            const data = JSON.stringify({ raid, pIndex, mIndex });
            ev.dataTransfer.setData("text/plain", data); ev.dataTransfer.effectAllowed = "move";
        }
        function dragOver(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
        async function drop(ev, targetRaid, targetPIndex, targetMIndex) {
            ev.preventDefault(); ev.currentTarget.classList.remove('drag-over');
            const data = ev.dataTransfer.getData("text/plain"); if (!data) return;
            const source = JSON.parse(data); if (source.raid === targetRaid && source.pIndex === targetPIndex && source.mIndex === targetMIndex) return;

            const sourceMember = rosterData[source.raid][source.pIndex].members[source.mIndex];
            const targetMember = rosterData[targetRaid][targetPIndex].members[targetMIndex];

            const sourcePartyReq = rosterData[source.raid][source.pIndex].reqGS || RAID_DIFFICULTIES[source.raid]["NM"];
            const targetPartyReq = rosterData[targetRaid][targetPIndex].reqGS || RAID_DIFFICULTIES[targetRaid]["NM"];

            const sGS = getActualGS(sourceMember.name, sourceMember.gs);
            const tGS = getActualGS(targetMember.name, targetMember.gs);

            if (sGS < targetPartyReq) { alert(`⚠️ TAKAS İPTAL: "${sourceMember.name}" karakterinin GS'si (${sGS}), hedef partinin sınırını (${targetPartyReq}) karşılamıyor!`); return; }
            if (tGS < sourcePartyReq) { alert(`⚠️ TAKAS İPTAL: "${targetMember.name}" karakterinin GS'si (${tGS}), hedef partinin sınırını (${sourcePartyReq}) karşılamıyor!`); return; }

            rosterData[source.raid][source.pIndex].members[source.mIndex] = targetMember;
            rosterData[targetRaid][targetPIndex].members[targetMIndex] = sourceMember;

            renderUI(); await saveDataToCloud();
        }

        // ---------------------------------------------------
        // PARTİ & KARAKTER EKLEME/SİLME
        // ---------------------------------------------------
        function openPartyModal(raid) {
            activeModalRaid = raid;
            const raidDisplayNames = { "armoche": "Armoche", "kazeros": "Kazeros", "serca": "Serca", "cathedral": "Cathedral" };
            document.getElementById('modalRaidName').innerText = `${raidDisplayNames[raid]} - Parti Ekle`;
            const selectBox = document.getElementById('difficultySelect'); selectBox.innerHTML = ''; 
            for (const [diff, gs] of Object.entries(RAID_DIFFICULTIES[raid])) {
                let option = document.createElement('option'); option.value = diff; option.innerText = `${diff} Mode (Min GS: ${gs})`;
                selectBox.appendChild(option);
            }
            document.getElementById('partyModal').style.display = 'flex';
        }
        function closePartyModal() { document.getElementById('partyModal').style.display = 'none'; activeModalRaid = ""; }

        async function confirmAddParty() {
            if (!activeModalRaid) return;
            const raid = activeModalRaid; const diff = document.getElementById('difficultySelect').value;
            const reqGS = RAID_DIFFICULTIES[raid][diff]; const currentPartyCount = rosterData[raid].length;
            rosterData[raid].push({ id: `${raid}_p_${Date.now()}`, name: `${currentPartyCount + 1}. Parti (${diff})`, reqGS: reqGS, done: false, members: [] });
            closePartyModal(); renderUI(); await saveDataToCloud();
        }

        async function removeParty(raid, pIndex, partyName) {
            if (confirm(`⚠️ DİKKAT: "${partyName}" adlı partiyi silmek istediğinize emin misiniz?`)) {
                rosterData[raid].splice(pIndex, 1);
                rosterData[raid].forEach((p, idx) => { p.name = p.name.replace(/^\d+\./, `${idx + 1}.`); });
                renderUI(); await saveDataToCloud();
            }
        }

        async function addCharacter(raid, pIndex) {
            const charName = prompt(`Yeni karakterin nickini girin:`); if (!charName || charName.trim() === "") return;
            const gsStr = prompt(`"${charName}" için Gearscore girin (Örn: 1720):`); if (!gsStr) return;
            const gs = parseFloat(gsStr); const partyReqGS = rosterData[raid][pIndex].reqGS || RAID_DIFFICULTIES[raid]["NM"];
            if (isNaN(gs) || gs < partyReqGS) { alert(`⚠️ HATA: "${charName}" isimli karakterin GS'si (${gs}), bu parti için yetersiz!\nMinimum GS gereksinimi: ${partyReqGS}`); return; }
            if (!rosterData.customGS) rosterData.customGS = {}; rosterData.customGS[charName.toLowerCase()] = gs;
            rosterData[raid][pIndex].members.push({ name: charName.trim(), region: "CE", gs: gs });
            renderUI(); await saveDataToCloud();
        }

        async function removeCharacter(raid, pIndex, mIndex, charName) {
            if (confirm(`"${charName}" karakterini bu partiden silmek istediğinize emin misiniz?`)) {
                rosterData[raid][pIndex].members.splice(mIndex, 1); renderUI(); await saveDataToCloud();
            }
        }

        async function togglePartyStatus(raid, pIndex, isChecked) {
            rosterData[raid][pIndex].done = isChecked; renderUI(); await saveDataToCloud(); 
        }

        // ---------------------------------------------------
        // ROSTER YÖNETİMİ (ADMIN PANEL)
        // ---------------------------------------------------
        async function addRosterCharacter(rosterName) {
            const charName = prompt(`"${rosterName}" grubuna eklenecek karakterin adını girin:`);
            if (!charName || charName.trim() === "") return;
            const gsStr = prompt(`"${charName}" için güncel Gearscore'u girin (Örn: 1720):`, "1700");
            if (!gsStr) return;
            const gs = parseFloat(gsStr);
            if (isNaN(gs)) { alert("Geçerli bir GS girilmedi!"); return; }

            if (!rosterData.customRosters) rosterData.customRosters = initDefaultData().customRosters;
            if (!rosterData.customGS) rosterData.customGS = {};

            rosterData.customRosters[rosterName].push(charName.toLowerCase());
            rosterData.customGS[charName.toLowerCase()] = gs;

            renderAdminRosters();
            document.getElementById('sync-status').innerText = "☁️ Roster güncelleniyor...";
            await saveDataToCloud();
            document.getElementById('sync-status').innerText = "✅ Roster başarıyla güncellendi.";
            setTimeout(() => { document.getElementById('sync-status').innerText = 'Sistem Hazır.'; }, 2000);
        }

        async function removeRosterCharacter(rosterName, charName) {
            if (confirm(`"${charName}" karakterini ${rosterName} grubundan kalıcı olarak silmek istediğinize emin misiniz?`)) {
                rosterData.customRosters[rosterName] = rosterData.customRosters[rosterName].filter(c => c !== charName);
                renderAdminRosters();
                document.getElementById('sync-status').innerText = "☁️ Roster güncelleniyor...";
                await saveDataToCloud();
                document.getElementById('sync-status').innerText = "✅ Roster başarıyla güncellendi.";
                setTimeout(() => { document.getElementById('sync-status').innerText = 'Sistem Hazır.'; }, 2000);
            }
        }

        // ---------------------------------------------------
        // UI OLUŞTURMA (RENDER MAIN PAGE)
        // ---------------------------------------------------
        function renderUI() {
            const container = document.getElementById('raid-container'); container.innerHTML = '';
            const raidDisplayNames = { "armoche": "Armoche", "kazeros": "Kazeros", "serca": "Serca", "cathedral": "Cathedral" };
            const trackers = rosterData.customRosters ? rosterData.customRosters["Bilge Roster"] : [];

            raidList.forEach(raid => {
                let section = document.createElement('div'); section.className = 'raid-section'; section.setAttribute('data-raid', raid);
                let title = document.createElement('h2'); title.className = 'raid-title'; title.innerText = raidDisplayNames[raid]; section.appendChild(title);
                let grid = document.createElement('div'); grid.className = 'parties-grid';
                if (rosterData[raid] && Array.isArray(rosterData[raid])) {
                    rosterData[raid].forEach((party, pIndex) => {
                        let card = document.createElement('div'); card.className = `party-card ${party.done ? 'completed' : ''}`;
                        let cardHTML = `
                            <div class="party-header">
                                <div class="party-header-left">
                                    <span class="party-title">${party.name}</span>
                                    <button class="delete-party-btn" onclick="removeParty('${raid}', ${pIndex}, '${party.name}')" title="Partiyi Komple Sil">🗑️</button>
                                </div>
                                <input type="checkbox" class="status-checkbox" ${party.done ? 'checked' : ''} onchange="togglePartyStatus('${raid}', ${pIndex}, this.checked)">
                            </div>
                            <ul class="member-list">
                        `;
                        if (party.members && Array.isArray(party.members)) {
                            party.members.forEach((member, mIndex) => {
                                let isTracker = trackers.includes(member.name.toLowerCase());
                                let displayGS = getActualGS(member.name, member.gs);
                                cardHTML += `
                                    <li class="member-item ${isTracker ? 'tracker' : ''}" title="Takaslamak için sürükleyin" draggable="true"
                                        ondragstart="dragStart(event, '${raid}', ${pIndex}, ${mIndex})" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="drop(event, '${raid}', ${pIndex}, ${mIndex})">
                                        <div class="member-info">
                                            <span class="member-name">${member.name}</span>
                                            ${displayGS ? `<span class="member-gs" onclick="editCharacterGS('${member.name}', ${displayGS})" title="GS Düzenle">[${displayGS}]</span>` : ''}
                                            <span class="member-region">${member.region}</span>
                                        </div>
                                        <button class="delete-btn" onclick="removeCharacter('${raid}', ${pIndex}, ${mIndex}, '${member.name}')">✖</button>
                                    </li>
                                `;
                            });
                        }
                        cardHTML += `</ul><button class="add-member-btn" onclick="addCharacter('${raid}', ${pIndex})">+ Karakter Ekle</button>`;
                        card.innerHTML = cardHTML; grid.appendChild(card);
                    });
                }
                section.appendChild(grid);
                let addPartyBtn = document.createElement('button'); addPartyBtn.className = 'add-party-btn'; addPartyBtn.innerText = `+ ${raidDisplayNames[raid]} İçin Yeni Parti Ekle`;
                addPartyBtn.onclick = () => openPartyModal(raid); section.appendChild(addPartyBtn);
                container.appendChild(section);
            });
        }

        // ---------------------------------------------------
        // ADMIN PANELI (TEK SAYFA ENTEGRASYONU)
        // ---------------------------------------------------
        function openAdminModal() {
            const pass = prompt("Admin Şifresini Girin:");
            if (pass !== "1234") { alert("Yanlış Şifre!"); return; }
            renderAdminTable();
            renderAdminRosters();
            document.getElementById('adminModal').style.display = 'flex';
        }

        function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }

        function renderAdminTable() {
            let html = `<table class="admin-table"><tr><th>Raid</th><th>Parti İsmi</th><th>Min GS</th><th>Üyeler (GS)</th><th>Durum</th></tr>`;
            raidList.forEach(raid => {
                if (rosterData[raid] && Array.isArray(rosterData[raid])) {
                    rosterData[raid].forEach(party => {
                        let memberString = party.members.map(m => `${m.name} (${getActualGS(m.name, m.gs)})`).join(", ");
                        let statusHtml = party.done ? `<span class="status-done">Bitti</span>` : `<span class="status-wait">Bekliyor</span>`;
                        html += `<tr>
                                    <td style="text-transform: uppercase; font-weight:bold;">${raid}</td>
                                    <td>${party.name}</td>
                                    <td>${party.reqGS || "-"}</td>
                                    <td>${memberString || "<em>Boş</em>"}</td>
                                    <td>${statusHtml}</td>
                                 </tr>`;
                    });
                }
            });
            html += `</table>`;
            document.getElementById('table-container').innerHTML = html;
            document.getElementById('admin-table-container').innerHTML = html;
        }

        function renderAdminRosters() {
            if (!rosterData.customRosters) return;
            let html = '';
            for (const [rosterName, members] of Object.entries(rosterData.customRosters)) {
                html += `
                <div class="roster-group">
                    <h4>${rosterName}</h4>
                    <div class="roster-grid">`;
                
                members.forEach(member => {
                    let actualGS = getActualGS(member, KNOWN_GS[member] || 0);
                    let displayName = member.charAt(0).toUpperCase() + member.slice(1);
                    html += `
                        <div class="roster-member">
                            <span style="display:flex; align-items:center;">
                                ${displayName} 
                                <button class="roster-del-btn" onclick="removeRosterCharacter('${rosterName}', '${member}')" title="Karakteri Gruptan Sil">✖</button>
                            </span>
                            <span class="member-gs" onclick="editCharacterGS('${member}', ${actualGS})" title="GS Düzenle">[${actualGS}]</span>
                        </div>`;
                });
                
                html += `</div>
                <button class="add-roster-char-btn" onclick="addRosterCharacter('${rosterName}')">+ ${rosterName}'a Karakter Ekle</button>
                </div>`;
            }
            document.getElementById('admin-rosters-container').innerHTML = html;
        }

        function openRawJsonModal() {
            document.getElementById('admin-json-editor').value = JSON.stringify(rosterData, null, 4);
            document.getElementById('rawJsonModal').style.display = 'flex';
        }

        function closeRawJsonModal() { document.getElementById('rawJsonModal').style.display = 'none'; }

        async function saveRawJsonData() {
            try {
                const editedJson = document.getElementById('admin-json-editor').value;
                const parsed = JSON.parse(editedJson); 
                rosterData = parsed; 
                renderUI(); 
                if (document.getElementById('adminModal').style.display === 'flex') {
                    renderAdminTable(); renderAdminRosters();
                }
                
                document.getElementById('sync-status').innerText = "☁️ Admin değişiklikleri kaydediliyor...";
                await fetch(WORKER_URL + "/?action=save", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(rosterData) });
                closeRawJsonModal();
                document.getElementById('sync-status').innerText = "✅ Veritabanı başarıyla güncellendi.";
                setTimeout(() => { document.getElementById('sync-status').innerText = 'Sistem Hazır.'; }, 2000);
            } catch (error) {
                alert("HATA: Girdiğiniz JSON formatı bozuk! Parantez veya virgülleri kontrol edin.");
            }
        }

        // ---------------------------------------------------
        // API LOG SENKRONİZASYONU
        // ---------------------------------------------------
        async function syncAllParties() {
            const statusText = document.getElementById('sync-status');
            const lastResetTime = getLastResetTimestamp();
            let updatedCount = 0; let fetchQueue = [];
            const trackers = rosterData.customRosters ? rosterData.customRosters["Bilge Roster"] : [];
            
            raidList.forEach(raid => {
                if (rosterData[raid] && Array.isArray(rosterData[raid])) {
                    rosterData[raid].forEach((party, pIndex) => {
                        if (!party.done) {
                            let tracker = party.members.find(m => trackers.includes(m.name.toLowerCase()));
                            if (tracker) { fetchQueue.push({ raid, pIndex, partyName: party.name, tracker }); }
                        }
                    });
                }
            });

            if (fetchQueue.length === 0) { statusText.innerText = "✅ Bütün partiler zaten tamamlanmış!"; statusText.style.color = "var(--success-green)"; return; }

            const syncBtn = document.querySelector('.sync-btn'); syncBtn.disabled = true; syncBtn.style.opacity = "0.5";

            for (let i = 0; i < fetchQueue.length; i++) {
                let task = fetchQueue[i]; let char = task.tracker;
                statusText.innerText = `⏳ Taranıyor: ${task.partyName} (${task.raid.toUpperCase()}) [${i+1}/${fetchQueue.length}]`;
                statusText.style.color = "var(--accent-gold)";

                let targetUrl = `https://lostark.bible/character/${char.region}/${char.name}/logs`;
                let proxyUrl = `${WORKER_URL}/?url=${encodeURIComponent(targetUrl)}`;
                let success = false; let retryCount = 0;

                while (!success && retryCount < 2) {
                    try {
                        let response = await fetch(proxyUrl);
                        if (response.status === 429) throw new Error("429_RATE_LIMIT");
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
                        let pageText = await response.text();
                        if (pageText) {
                            let regex = /\{[^}]*boss:"([^"]+)"[^}]*timestamp:(\d+)[^}]*\}/g;
                            let match;
                            while ((match = regex.exec(pageText)) !== null) {
                                let bossName = match[1].toLowerCase(); let killTime = parseInt(match[2]);
                                if (killTime > lastResetTime && bossName.includes(task.raid)) {
                                    rosterData[task.raid][task.pIndex].done = true; updatedCount++; break; 
                                }
                            }
                            success = true; 
                        }
                    } catch (error) {
                        if (error.message === "429_RATE_LIMIT") { retryCount++; statusText.innerText = `⚠️ 429 Hızı Aşıldı. 5sn mola...`; await new Promise(resolve => setTimeout(resolve, 5000)); } 
                        else { break; }
                    }
                }
                if (success) { renderUI(); } await new Promise(resolve => setTimeout(resolve, 2500));
            }

            if (updatedCount > 0) { statusText.innerText = "☁️ Kaydediliyor..."; await saveDataToCloud(); }
            syncBtn.disabled = false; syncBtn.style.opacity = "1"; statusText.style.color = "var(--success-green)";
            statusText.innerText = updatedCount > 0 ? `✅ Tarama bitti! ${updatedCount} adet parti tamamladı.` : `✅ Tarama bitti. Yeni tamamlanan yok.`;
            setTimeout(() => { statusText.innerText = 'Sistem Hazır.'; statusText.style.color = 'var(--accent-gold)'; }, 6000);
        }

        // --- BAŞLATMA ---
        loadDataFromCloud();
    </script>
</body>
</html>
