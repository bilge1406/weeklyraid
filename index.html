<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Ark Parti Takipçisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap');

        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141418;
            --card-border: #2a2a35;
            --text-main: #e2e8f0;
            --text-muted: #838392;
            --accent-gold: #d4af37;
            --accent-red: #e11d48;
            --success-green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(225, 29, 72, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        h1 span { color: var(--accent-gold); }

        .dashboard-controls {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }

        .sync-btn {
            background: linear-gradient(135deg, var(--accent-red), #9f1239);
            color: white;
            border: none;
            padding: 12px 24px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            width: 100%;
        }
        .sync-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(225, 29, 72, 0.4); }

        #sync-status {
            font-size: 14px;
            color: var(--accent-gold);
            font-weight: 600;
            min-height: 20px;
            text-align: center;
        }

        .raid-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .raid-section {
            background: rgba(20, 20, 24, 0.6);
            border-top: 3px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            position: relative;
        }

        .raid-section[data-raid="armoche"] { border-top-color: #3b82f6; }
        .raid-section[data-raid="kazeros"] { border-top-color: #ef4444; }
        .raid-section[data-raid="serca"] { border-top-color: #a855f7; }
        .raid-section[data-raid="cathedral"] { border-top-color: #eab308; }

        .raid-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 25px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .parties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .party-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        /* Parti Tamamlandığında Kartın Görünümü */
        .party-card.completed {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .party-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--card-border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .party-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .member-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        /* Gözlemci karakteri (Bigle roster) hafif vurgulamak istersen */
        .member-item.tracker {
            border-left: 2px solid var(--accent-gold);
        }

        .member-name { font-weight: 600; color: #cbd5e1; }
        .member-region { font-size: 10px; color: var(--text-muted); background: #1e1e24; padding: 2px 4px; border-radius: 4px; margin-left: 6px;}

        .status-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background-color: transparent;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .status-checkbox:checked {
            background-color: var(--success-green);
            border-color: var(--success-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .status-checkbox:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Lost Ark <span>Static</span> Takipçisi</h1>

    <div class="dashboard-controls">
        <button class="sync-btn" onclick="syncAllParties()">🔄 API Log Taramasını Başlat</button>
        <div id="sync-status">Sistem Hazır. Tüm partiler için tarama başlatabilirsiniz.</div>
    </div>

    <div class="raid-container" id="raid-container">
        <!-- JS tarafından doldurulacak -->
    </div>

    <script>
        // Bigle Roster: (Sistem log aramalarını SADECE bu karakterler üzerinden yapacak)
        const bigleRoster = ["jihyogehan", "boksorgehan", "dancergehan", "ayibogangehan", "orakgehan", "wintergehan"];
        
        const raidList = ["armoche", "kazeros", "serca", "cathedral"];
        
        function initDefaultData() {
            let defaultData = {};
            
            // 1. DİĞER RAİDLER: Armoche ve Kazeros (3 Kişilik Partiler)
            const threeManRaids = ["armoche", "kazeros"];
            threeManRaids.forEach(raid => {
                defaultData[raid] = [
                    { 
                        id: `${raid}_p1`, name: "1. Parti", done: false,
                        members: [
                            { name: "Aelathea", region: "CE" },
                            { name: "Holysissy", region: "CE" },
                            { name: "Dancergehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p2`, name: "2. Parti", done: false,
                        members: [
                            { name: "Anilessa", region: "CE" },
                            { name: "Artissy", region: "CE" },
                            { name: "Boksorgehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p3`, name: "3. Parti", done: false,
                        members: [
                            { name: "Laithwen", region: "CE" },
                            { name: "Boisy", region: "CE" },
                            { name: "Ayibogangehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p4`, name: "4. Parti", done: false,
                        members: [
                            { name: "Zeradorpala", region: "CE" },
                            { name: "Buckysy", region: "CE" },
                            { name: "Orakgehan", region: "CE" } // Tracker
                        ]
                    }
                ];
            });

            // 2. SERCA VE CATHEDRAL ÖZEL: 2 Kişilik Partiler (Toplam 6 Parti - 2 Aelathea, 4 Holysissy)
            const twoManRaids = ["serca", "cathedral"];
            twoManRaids.forEach(raid => {
                defaultData[raid] = [
                    { 
                        id: `${raid}_p1`, name: "1. Parti", done: false,
                        members: [
                            { name: "Aelathea", region: "CE" },
                            { name: "Dancergehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p2`, name: "2. Parti", done: false,
                        members: [
                            { name: "Anilessa", region: "CE" },
                            { name: "Boksorgehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p3`, name: "3. Parti", done: false,
                        members: [
                            { name: "Holysissy", region: "CE" },
                            { name: "Ayibogangehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p4`, name: "4. Parti", done: false,
                        members: [
                            { name: "Artissy", region: "CE" },
                            { name: "Orakgehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p5`, name: "5. Parti (Ekstra)", done: false,
                        members: [
                            { name: "Boisy", region: "CE" },
                            { name: "Jihyogehan", region: "CE" } // Tracker
                        ]
                    },
                    { 
                        id: `${raid}_p6`, name: "6. Parti (Ekstra)", done: false,
                        members: [
                            { name: "Buckysy", region: "CE" },
                            { name: "Wintergehan", region: "CE" } // Tracker
                        ]
                    }
                ];
            });

            return defaultData;
        }

        let rosterData = {};

        function loadData() {
            // Önbellek çakışmasını önlemek için sürümü V4 olarak güncelledik
            let saved = localStorage.getItem('lostArkStaticTrackerV4');
            if (saved) {
                rosterData = JSON.parse(saved);
            } else {
                rosterData = initDefaultData();
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem('lostArkStaticTrackerV4', JSON.stringify(rosterData));
        }

        // Haftalık Çarşamba Sıfırlaması
        function getLastResetTimestamp() {
            let now = new Date();
            let resetDate = new Date(now);
            resetDate.setHours(13, 0, 0, 0);
            let day = now.getDay(); 
            let daysToSubtract = (day >= 3) ? (day - 3) : (day + 4);
            if (day === 3 && now.getHours() < 13) { daysToSubtract = 7; }
            resetDate.setDate(now.getDate() - daysToSubtract);
            return resetDate.getTime();
        }

        function checkWeeklyReset() {
            const lastReset = localStorage.getItem('staticLastResetTimeV4');
            const recentWedTime = getLastResetTimestamp();

            if (!lastReset || parseInt(lastReset) < recentWedTime) {
                rosterData = initDefaultData(); 
                saveData();
                localStorage.setItem('staticLastResetTimeV4', new Date().getTime()); 
                console.log("Haftalık sıfırlama yapıldı.");
            }
        }

        // ---------------------------------------------------
        // UI OLUŞTURMA (RENDER)
        // ---------------------------------------------------
        function renderUI() {
            const container = document.getElementById('raid-container');
            container.innerHTML = '';

            const raidDisplayNames = {
                "armoche": "Armoche",
                "kazeros": "Kazeros",
                "serca": "Serca",
                "cathedral": "Cathedral"
            };

            raidList.forEach(raid => {
                let section = document.createElement('div');
                section.className = 'raid-section';
                section.setAttribute('data-raid', raid);

                let title = document.createElement('h2');
                title.className = 'raid-title';
                title.innerText = raidDisplayNames[raid];
                section.appendChild(title);

                let grid = document.createElement('div');
                grid.className = 'parties-grid';

                rosterData[raid].forEach((party, pIndex) => {
                    let card = document.createElement('div');
                    card.className = `party-card ${party.done ? 'completed' : ''}`;

                    let cardHTML = `
                        <div class="party-header">
                            <span class="party-title">${party.name}</span>
                            <input type="checkbox" class="status-checkbox" 
                                ${party.done ? 'checked' : ''} 
                                onchange="togglePartyStatus('${raid}', ${pIndex}, this.checked)" title="Tüm Partiyi Tamamla">
                        </div>
                        <ul class="member-list">
                    `;

                    party.members.forEach((member) => {
                        let isTracker = bigleRoster.includes(member.name.toLowerCase());
                        cardHTML += `
                            <li class="member-item ${isTracker ? 'tracker' : ''}" title="${isTracker ? 'API Gözlemcisi' : ''}">
                                <div>
                                    <span class="member-name">${member.name}</span>
                                    <span class="member-region">${member.region}</span>
                                </div>
                            </li>
                        `;
                    });

                    cardHTML += `</ul>`;
                    
                    card.innerHTML = cardHTML;
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // Tik işaretlendiğinde sadece Parti durumunu değiştir
        function togglePartyStatus(raid, pIndex, isChecked) {
            rosterData[raid][pIndex].done = isChecked;
            saveData();
            renderUI(); 
        }

        // ---------------------------------------------------
        // YENİ NESİL CLOUDFLARE WORKER API SENKRONİZASYONU
        // ---------------------------------------------------
        async function syncAllParties() {
            const statusText = document.getElementById('sync-status');
            const lastResetTime = getLastResetTimestamp();
            let updatedCount = 0;

            // Sadece bitmemiş partileri ve içindeki Gözlemciyi (Bigle karakterini) bulalım
            let fetchQueue = [];
            raidList.forEach(raid => {
                rosterData[raid].forEach((party, pIndex) => {
                    if (!party.done) {
                        // Partideki Bigle karakterini bul
                        let tracker = party.members.find(m => bigleRoster.includes(m.name.toLowerCase()));
                        if (tracker) {
                            fetchQueue.push({ raid, pIndex, partyName: party.name, tracker });
                        }
                    }
                });
            });

            if (fetchQueue.length === 0) {
                statusText.innerText = "✅ Bütün partiler zaten tamamlanmış!";
                statusText.style.color = "var(--success-green)";
                return;
            }

            const syncBtn = document.querySelector('.sync-btn');
            syncBtn.disabled = true;
            syncBtn.style.opacity = "0.5";

            for (let i = 0; i < fetchQueue.length; i++) {
                let task = fetchQueue[i];
                let char = task.tracker;
                
                statusText.innerText = `⏳ Taranıyor: ${task.partyName} (${task.raid.toUpperCase()}) -> Gözlemci: ${char.name} [${i+1}/${fetchQueue.length}]`;
                statusText.style.color = "var(--accent-gold)";

                let targetUrl = `https://lostark.bible/character/${char.region}/${char.name}/logs`;
                let proxyUrl = `https://lostarkproxy.bilgehangulseven.workers.dev/?url=${encodeURIComponent(targetUrl)}`;

                let success = false;
                let retryCount = 0;

                while (!success && retryCount < 2) {
                    try {
                        let response = await fetch(proxyUrl);
                        if (response.status === 429) throw new Error("429_RATE_LIMIT");
                        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);

                        let pageText = await response.text();
                        
                        if (pageText) {
                            let regex = /\{[^}]*boss:"([^"]+)"[^}]*timestamp:(\d+)[^}]*\}/g;
                            let match;

                            while ((match = regex.exec(pageText)) !== null) {
                                let bossName = match[1].toLowerCase();
                                let killTime = parseInt(match[2]);

                                // Eğer bu log haftalık reseti geçmişse VE aradığımız raid ismi logda geçiyorsa
                                if (killTime > lastResetTime && bossName.includes(task.raid)) {
                                    // Bütün partiyi bitmiş olarak işaretle
                                    rosterData[task.raid][task.pIndex].done = true;
                                    updatedCount++;
                                    break; 
                                }
                            }
                            success = true; 
                        }
                    } catch (error) {
                        if (error.message === "429_RATE_LIMIT") {
                            retryCount++;
                            statusText.innerText = `⚠️ 429 Hızı Aşıldı. 5sn mola... (${char.name})`;
                            await new Promise(resolve => setTimeout(resolve, 5000));
                        } else {
                            console.error("Fetch Hatası:", error);
                            break; 
                        }
                    }
                }

                if (success) {
                    saveData();
                    renderUI(); 
                }

                await new Promise(resolve => setTimeout(resolve, 2500));
            }

            syncBtn.disabled = false;
            syncBtn.style.opacity = "1";
            
            statusText.style.color = "var(--success-green)";
            statusText.innerText = updatedCount > 0 
                ? `✅ Tarama bitti! ${updatedCount} adet parti raid'ini tamamladı.` 
                : `✅ Tarama bitti. Yeni tamamlanan parti bulunamadı.`;

            setTimeout(() => { 
                statusText.innerText = 'Sistem Hazır. Tüm partiler için tarama başlatabilirsiniz.';
                statusText.style.color = 'var(--accent-gold)';
            }, 6000);
        }

        // --- BAŞLATMA ---
        loadData();
        checkWeeklyReset();
        renderUI();

    </script>
</body>
</html>
