<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost Ark Parti Takipçisi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap');

        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141418;
            --card-border: #2a2a35;
            --text-main: #e2e8f0;
            --text-muted: #838392;
            --accent-gold: #d4af37;
            --accent-red: #e11d48;
            --success-green: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(225, 29, 72, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(212, 175, 55, 0.05), transparent 25%);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        h1 span { color: var(--accent-gold); }

        .dashboard-controls {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 20px 30px;
            border-radius: 8px;
            margin-bottom: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        .sync-btn, .cloud-btn {
            color: white;
            border: none;
            padding: 12px 20px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            flex: 1;
        }

        .sync-btn { background: linear-gradient(135deg, var(--accent-red), #9f1239); }
        .sync-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(225, 29, 72, 0.4); }

        .cloud-btn { background: linear-gradient(135deg, #3b82f6, #1d4ed8); flex: 0.5; }
        .cloud-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(59, 130, 246, 0.4); }

        #sync-status {
            font-size: 14px;
            color: var(--accent-gold);
            font-weight: 600;
            min-height: 20px;
            text-align: center;
        }

        .raid-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 50px;
        }

        .raid-section {
            background: rgba(20, 20, 24, 0.6);
            border-top: 3px solid var(--card-border);
            border-radius: 12px;
            padding: 25px;
            position: relative;
        }

        .raid-section[data-raid="armoche"] { border-top-color: #3b82f6; }
        .raid-section[data-raid="kazeros"] { border-top-color: #ef4444; }
        .raid-section[data-raid="serca"] { border-top-color: #a855f7; }
        .raid-section[data-raid="cathedral"] { border-top-color: #eab308; }

        .raid-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 25px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .parties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
        }

        .party-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }

        .party-card.completed {
            border-color: rgba(16, 185, 129, 0.5);
            background: rgba(16, 185, 129, 0.05);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
        }

        .party-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed var(--card-border);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .party-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent-gold);
        }

        .member-list {
            list-style: none;
            padding: 0;
            margin: 0 0 10px 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-grow: 1;
        }

        .member-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            cursor: grab;
            user-select: none;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .member-item:active { cursor: grabbing; }
        
        .member-item.drag-over {
            border: 1px dashed var(--accent-gold);
            background: rgba(212, 175, 55, 0.1);
            transform: scale(1.02);
        }

        .member-item.tracker { border-left: 2px solid var(--accent-gold); }

        .member-item:hover .delete-btn { opacity: 1; pointer-events: auto; }

        .member-info { display: flex; align-items: center; gap: 8px; }
        .member-name { font-weight: 600; color: #cbd5e1; }
        .member-region { font-size: 10px; color: var(--text-muted); background: #1e1e24; padding: 2px 4px; border-radius: 4px; }

        .delete-btn {
            background: transparent;
            color: var(--accent-red);
            border: none;
            font-size: 14px;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            padding: 0 5px;
        }
        .delete-btn:hover { color: #fff; text-shadow: 0 0 5px var(--accent-red); }

        .add-member-btn {
            background: transparent;
            border: 1px dashed var(--card-border);
            color: var(--text-muted);
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: auto;
        }
        .add-member-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(212, 175, 55, 0.05);
        }

        .status-checkbox {
            appearance: none;
            -webkit-appearance: none;
            width: 26px;
            height: 26px;
            background-color: transparent;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }
        .status-checkbox:checked {
            background-color: var(--success-green);
            border-color: var(--success-green);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }
        .status-checkbox:checked::after {
            content: '✔';
            position: absolute;
            color: white;
            font-size: 16px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }

        .loading-text {
            text-align: center;
            color: var(--accent-gold);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; }
